<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計畫書編輯器</title>
<script>
/* 動態載入函式庫，依序嘗試多個 CDN */
(function(){
  function loadScript(cdns, onDone, flagName) {
    var idx = 0;
    function tryLoad() {
      if (idx >= cdns.length) { window[flagName + 'Failed'] = true; return; }
      var s = document.createElement('script');
      s.src = cdns[idx++];
      s.onload  = function(){ window[flagName + 'Ready'] = true; if(onDone) onDone(); };
      s.onerror = function(){ tryLoad(); };
      document.head.appendChild(s);
    }
    tryLoad();
  }

  loadScript([
    'https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js',
    'https://unpkg.com/docx@8.5.0/build/index.umd.js'
  ], null, '_docx');

  loadScript([
    'https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js',
    'https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js'
  ], null, '_mammoth');

  loadScript([
    'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js',
    'https://unpkg.com/jszip@3.10.1/dist/jszip.min.js'
  ], null, '_jszip');
})();
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e0e0e0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ══════════════════════════
   PANEL (fixed left sidebar)
══════════════════════════ */
#panel {
  width: 240px;
  background: #fff;
  border-right: 1px solid #d0d0d0;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 2px 0 8px rgba(0,0,0,0.06);
  z-index: 100;
}

/* tab bar at top of panel */
#panel-tabs {
  display: flex;
  border-bottom: 1px solid #e8e8e8;
  flex-shrink: 0;
}
.pn-tab {
  flex: 1; padding: 8px 0;
  background: none; border: none;
  font-size: 10px; color: #999;
  cursor: pointer; text-align: center;
  border-bottom: 2px solid transparent;
  transition: color 0.12s, border-color 0.12s;
  font-weight: 600; letter-spacing: 0.5px;
}
.pn-tab:hover { color: #333; }
.pn-tab.active { color: #111; border-bottom-color: #111; }

/* file action row */
#panel-actions {
  display: flex; gap: 4px;
  padding: 8px 10px;
  border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0;
}
.act-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  padding: 5px 2px;
  background: #f5f5f5; border: 1px solid #e0e0e0;
  border-radius: 6px; cursor: pointer;
  font-size: 9px; color: #555;
  transition: background 0.1s;
}
.act-btn:hover { background: #ebebeb; color: #111; }
.act-btn svg { display: block; }

#panel-inner {
  width: 240px;
  padding: 14px 12px 24px;
  overflow-y: auto;
  flex: 1;
}
#panel-inner::-webkit-scrollbar { width: 3px; }
#panel-inner::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.pn-title {
  font-size: 11px; font-weight: 600; color: #999;
  letter-spacing: 1px; text-transform: uppercase;
  margin: 12px 0 6px;
}
.pn-title:first-child { margin-top: 0; }

/* 極簡分區標籤 */
.pn-sec-label {
  font-size: 10px; font-weight: 600; color: #bbb;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin: 0 0 6px;
}
/* 分區分隔線 */
.pn-divider {
  height: 1px; background: #f0f0f0;
  margin: 10px 0 10px;
}

/* color swatches */
.pn-color-group {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.pn-color-label {
  font-size: 10px;
  font-weight: 600;
  color: #999;
  letter-spacing: 0.5px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  width: 28px;
  flex-shrink: 0;
}
.pn-color-row {
  display: flex;
  flex-wrap: nowrap;
  gap: 4px;
  align-items: center;
}
.clr-swatch {
  width: 22px;
  height: 22px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.1s, box-shadow 0.1s;
}
.clr-swatch:hover {
  transform: scale(1.15);
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}
.clr-custom {
  background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red) !important;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border-radius: 4px;
}
.clr-custom input[type="color"] {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}
.clr-custom span { display: none; }

/* bg blocks */
.bg-block {
  position: absolute;
  min-width: 40px;
  min-height: 20px;
  cursor: default;
  z-index: 1;
  box-sizing: border-box;
  user-select: none;
  pointer-events: none;   /* 預設穿透，不干擾文字編輯 */
}
/* 色塊編輯模式：色塊浮到文字上方並可互動 */
body.bg-edit-mode .bg-block {
  z-index: 10;
  pointer-events: auto;
  cursor: move;
  outline: 1px dashed rgba(0,0,0,0.3);
}
body.bg-edit-mode .page-body {
  pointer-events: none;   /* 編輯色塊時文字區不攔截 */
}
.bg-block-handle {
  position: absolute;
  right: 0; bottom: 0;
  width: 14px; height: 14px;
  cursor: se-resize;
  background: rgba(0,0,0,0.3);
  border-radius: 2px 0 0 0;
  display: none;
}
body.bg-edit-mode .bg-block-handle { display: block; }
.bg-block-del {
  position: absolute;
  top: -8px; right: -8px;
  width: 16px; height: 16px;
  background: #e53935;
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 10px;
  line-height: 16px;
  text-align: center;
  cursor: pointer;
  display: none;
  z-index: 11;
  padding: 0;
}
body.bg-edit-mode .bg-block:hover .bg-block-del { display: block; }

/* 色塊編輯模式切換按鈕 active 狀態 */
#bg-edit-btn.active { background: #111; color: #fff; border-color: #111; }

/* bg block panel */
#pn-bg-colors {
  display: flex;
  flex-wrap: nowrap;
  gap: 4px;
  align-items: center;
}
/* selected bg block highlight in edit mode */
.bg-block.bg-selected {
  outline: 2px solid #0078d4 !important;
  outline-offset: 1px;
}
.bg-clr-swatch {
  width: 22px;
  height: 22px;
  border: none;
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}
.bg-clr-swatch:hover {
  transform: scale(1.15);
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
.bg-clr-custom {
  background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red) !important;
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}
.bg-clr-custom input[type="color"] {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

/* doc name input */
#doc-name-wrap {
  margin-bottom: 4px;
}
#doc-name-input {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  font-size: 13px;
  color: #222;
  background: #fafafa;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
#doc-name-input:focus {
  border-color: #888;
  background: #fff;
}

/* row of buttons */
.pn-row {
  display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: nowrap;
}

.pn-btn {
  flex: 1;
  padding: 7px 4px;
  background: #f5f5f5;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px; color: #333;
  text-align: center;
  transition: background 0.1s, border-color 0.1s;
  white-space: nowrap;
}
.pn-btn:hover { background: #ebebeb; border-color: #ccc; }
.pn-btn.dark { background: #111; color: #fff; border-color: #111; }
.pn-btn.dark:hover { background: #333; }
.pn-btn.active { background: #111; color: #fff; border-color: #111; }

/* icon grid 4-col */
.pn-grid4 {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 8px;
}
.pn-grid3 {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-bottom: 8px;
}
.ic {
  padding: 7px 0; text-align: center;
  background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 6px;
  cursor: pointer; font-size: 14px; color: #333;
  transition: background 0.1s;
}
.ic:hover { background: #ebebeb; }
.ic svg { display: block; margin: 0 auto; }

/* font buttons */
.font-kai { font-family: '標楷體','BiauKai','DFKai-SB',serif; font-size: 15px; }
.font-hei { font-family: Arial, sans-serif; }
.font-min { font-family: 'Times New Roman', serif; }

/* ── 浮動圖片 ── */
.float-img-wrap {
  position: absolute;
  cursor: move;
  user-select: none;
  z-index: 10;
  line-height: 0;
}
.float-img-wrap img {
  display: block;
  max-width: 100%;
  pointer-events: none;
}
.float-img-wrap .img-resize-handle {
  position: absolute;
  right: -5px; bottom: -5px;
  width: 12px; height: 12px;
  background: #fff;
  border: 2px solid #555;
  border-radius: 2px;
  cursor: se-resize;
  z-index: 11;
  display: none;
}
.float-img-wrap .img-delete-btn {
  position: absolute;
  top: -10px; right: -10px;
  width: 20px; height: 20px;
  background: #e00; color: #fff;
  border: none; border-radius: 50%;
  font-size: 12px; line-height: 20px;
  text-align: center; cursor: pointer;
  display: none; z-index: 12;
}
.float-img-wrap:hover .img-resize-handle,
.float-img-wrap.selected .img-resize-handle { display: block; }
.float-img-wrap:hover .img-delete-btn,
.float-img-wrap.selected .img-delete-btn { display: block; }
.float-img-wrap.selected { outline: 2px solid #0078d4; }

/* ── 浮動文字框 ── */
.float-txt-wrap {
  position: absolute;
  cursor: move;
  user-select: none;
  z-index: 10;
  min-width: 60px;
  min-height: 24px;
}
.float-txt-wrap .float-txt-body {
  width: 100%;
  height: 100%;
  outline: none;
  font-family: '標楷體','BiauKai','DFKai-SB',serif;
  font-size: 14pt;
  line-height: 24pt;
  color: #000;
  word-break: break-all;
  overflow-wrap: break-word;
  white-space: pre-wrap;
  cursor: text;
  background: transparent;
  border: none;
  padding: 2px 4px;
  box-sizing: border-box;
}
.float-txt-wrap .float-txt-body[data-vertical="true"] {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  line-height: 28pt;
}
.float-txt-wrap .float-txt-resize {
  position: absolute;
  right: -5px; bottom: -5px;
  width: 12px; height: 12px;
  background: #fff;
  border: 2px solid #555;
  border-radius: 2px;
  cursor: se-resize;
  z-index: 11;
  display: none;
}
.float-txt-wrap .float-txt-del {
  position: absolute;
  top: -10px; right: -10px;
  width: 20px; height: 20px;
  background: #e00; color: #fff;
  border: none; border-radius: 50%;
  font-size: 12px; line-height: 20px;
  text-align: center; cursor: pointer;
  display: none; z-index: 12;
}
.float-txt-wrap:hover .float-txt-resize,
.float-txt-wrap.selected .float-txt-resize { display: block; }
.float-txt-wrap:hover .float-txt-del,
.float-txt-wrap.selected .float-txt-del { display: block; }
.float-txt-wrap.selected { outline: 2px solid #e67e00; }
/* 列印時隱藏控制項，確保文字正確顯示 */
@media print {
  .float-txt-wrap .float-txt-resize,
  .float-txt-wrap .float-txt-del { display: none !important; }
  .float-txt-wrap.selected { outline: none !important; }
  .float-txt-wrap { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .float-txt-wrap .float-txt-body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  /* 超連結在 PDF 中保留顏色與底線 */
  a { color: #0563c1 !important; text-decoration: underline !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* ── 表格（從 DOCX 載入） ── */
.page-body table {
  border-collapse: collapse;
  width: 100%;
  margin: 4pt 0;
  font-family: '標楷體','BiauKai','DFKai-SB',serif;
  font-size: 14pt;
  line-height: 24pt;
}
.page-body table td,
.page-body table th {
  padding: 4px 8px;
  vertical-align: top;
  word-break: break-all;
}

/* margin grid */
.mg-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px;
}
.mg-cell { display: flex; flex-direction: column; gap: 2px; }
.mg-cell label { font-size: 10px; color: #999; }
.mg-cell input {
  background: #f5f5f5; border: 1px solid #e0e0e0; color: #222;
  padding: 4px 6px; border-radius: 5px; font-size: 12px; width: 100%;
}
.mg-cell input:focus { outline: 1.5px solid #111; background: #fff; }

.mg-note { font-size: 10px; color: #bbb; line-height: 1.5; margin-top: 4px; }

.pn-sep { height: 1px; background: #f0f0f0; margin: 10px 0; }

/* ══════════════════════════
   MAIN AREA
══════════════════════════ */
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
}

/* top info strip */
#topbar {
  background: #fff;
  border-bottom: 1px solid #d8d8d8;
  padding: 5px 14px;
  display: flex; gap: 12px; align-items: center;
  flex-shrink: 0;
}
#topbar span { font-size: 11px; color: #999; }
#stat-font-top { margin-left: auto; }

/* canvas */
#scroll-area {
  flex: 1; overflow-y: auto; overflow-x: auto;
  padding: 32px 40px 80px;
  background: #e0e0e0;
  position: relative;
}

/* zoom bar — sticky top-left in scroll area */
#zoom-bar {
  position: sticky; top: 0; left: 0; z-index: 50;
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.92);
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 4px 8px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  backdrop-filter: blur(6px);
}
#zoom-bar button {
  background: #f0f0f0; border: 1px solid #ddd; color: #333;
  width: 24px; height: 24px; border-radius: 5px;
  cursor: pointer; font-size: 15px; line-height: 1;
}
#zoom-bar button:hover { background: #e4e4e4; }
#zoom-val { font-size: 11px; color: #555; min-width: 36px; text-align: center; }
#zoom-fit {
  background: #f0f0f0; border: 1px solid #ddd; color: #555;
  padding: 0 8px; height: 24px; border-radius: 5px;
  cursor: pointer; font-size: 10px;
  white-space: nowrap; flex-shrink: 0;
  width: auto !important;
}
#zoom-fit:hover { background: #e4e4e4; color: #111; }

#float-move-btn.active { background: #e67e00 !important; color: #fff !important; border-color: #e67e00 !important; }

#zoom-wrapper { transform-origin: top center; display: inline-block; min-width: 100%; }

/* ══ A4 PAGE ══ */
.a4-page {
  width: 794px;
  background: #fff;
  margin: 0 auto 28px;
  border-radius: 4px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
  position: relative;
  min-height: 1123px;
  overflow: visible;
}

/* selected page highlight (like reference image) */
.a4-page.selected {
  box-shadow: 0 2px 12px rgba(0,0,0,0.18), 0 0 0 2px #333;
}

.page-guide {
  display: none; position: absolute;
  top: 96px; left: 120px; right: 120px; bottom: 0;
  border: 1px dashed rgba(0,100,255,0.25); pointer-events: none; z-index: 5;
}
.show-guides .page-guide { display: block; }

.page-body {
  position: relative;
  z-index: 2;
  padding: 96px 120px 80px 120px;
  font-family: '標楷體','BiauKai','DFKai-SB',serif;
  font-size: 14pt; line-height: 24pt; color: #000;
  outline: none; word-break: break-all; overflow-wrap: break-word;
  min-height: 931px;
}
.page-body:focus-within { }
.page-body:empty::before { content: '點此開始輸入...'; color: #ccc; pointer-events: none; }
.page-body h1 { font-size:18pt; line-height:24pt; font-weight:bold; margin:0; font-family:'標楷體','BiauKai','DFKai-SB',serif; }
.page-body h2 { font-size:16pt; line-height:24pt; font-weight:bold; margin:0; font-family:'標楷體','BiauKai','DFKai-SB',serif; }
.page-body p, .page-body div { font-size:14pt; line-height:24pt; margin:0; font-family:'標楷體','BiauKai','DFKai-SB',serif; }

.page-footer {
  position: absolute; bottom: 28px; left: 0; right: 0;
  text-align: center; font-size: 11pt;
  font-family: '標楷體','BiauKai',serif; color: #999; pointer-events: none;
}

/* add page */
#add-page-wrap { text-align:center; padding: 0 0 20px; min-width: 794px; }
#add-page-btn {
  display: inline-block; width: 200px; padding: 9px 0;
  background: #fff; border: 2px dashed #bbb; border-radius: 8px;
  cursor: pointer; font-size: 13px; color: #888;
  transition: border-color 0.15s, color 0.15s;
}
#add-page-btn:hover { border-color: #555; color: #333; }

/* toast */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #111; color: #fff; padding: 7px 18px; border-radius: 20px;
  font-size: 12px; z-index: 9999;
  opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* status bar */
#status-bar {
  background: #fff; color: #bbb; font-size: 10px;
  padding: 3px 14px; display: flex; gap: 16px;
  flex-shrink: 0; border-top: 1px solid #e8e8e8;
}

@media print {
  #panel,#topbar,#status-bar,#add-page-wrap,#toast,#zoom-bar { display:none!important; }
  body { display:block; background:#fff; height:auto; overflow:visible; }
  #main { overflow:visible; }
  #scroll-area { overflow:visible; padding:0; background:#fff; }
  #zoom-wrapper { transform:none!important; display:block; }
  .a4-page { box-shadow:none; margin:0 auto; page-break-after:always; width:210mm!important; min-height:297mm!important; border-radius:0; }
  .a4-page.selected { box-shadow:none; }
  .a4-page:last-of-type { page-break-after:avoid; }
  .page-guide { display:none!important; }
  .page-body { padding-top:25.4mm!important; padding-bottom:25.4mm!important; padding-left:31.7mm!important; padding-right:31.7mm!important; min-height:0!important; }
  .page-footer { bottom:7mm!important; }
  /* 列印時色塊正常顯示，隱藏編輯控制項 */
  .bg-block { pointer-events:none!important; outline:none!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .bg-block-handle, .bg-block-del { display:none!important; }
  /* 列印時圖片正常顯示，隱藏控制項 */
  .float-img-wrap { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .float-img-wrap .img-resize-handle,
  .float-img-wrap .img-delete-btn { display:none!important; }
  .float-img-wrap.selected { outline:none!important; }
}
</style>
</head>
<body>

<!-- ══ PANEL ══ -->
<div id="panel">

  <!-- 檔案操作列 -->
  <div id="panel-actions">
    <label class="act-btn" title="開啟 HTML / DOCX" style="cursor:pointer;">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M2 6a1 1 0 011-1h4l2 2h6a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V6z" stroke="currentColor" stroke-width="1.5"/></svg>
      開啟
      <input type="file" accept=".html,.docx" onchange="loadFile(event)" style="display:none;">
    </label>
    <button class="act-btn" onclick="exportPDF()" title="匯出 PDF">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 3v9m0 0l-3-3m3 3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      PDF

    <span id="stat-zoom">100%</span>
  </div>

<div id="toast"></div>

<script>
var pageCount  = 0;
var guidesOn   = false;
var currentZoom = 100;
var MM = 96 / 25.4;
var margins = { top:96, bottom:96, left:120, right:120 };
var currentPanel = 'text';

/* ── Tab switch ── */
function switchTab(name) {
  ['text','page','margin'].forEach(function(p) {
    document.getElementById('pn-' + p).style.display = 'none';
    document.getElementById('tab-' + p).classList.remove('active');
  });
  document.getElementById('pn-' + name).style.display = 'block';
  document.getElementById('tab-' + name).classList.add('active');
  currentPanel = name;
}

/* ── Toast ── */
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

/* ── Margins ── */
function applyMargins() {
  var mt = parseFloat(document.getElementById('mg-top').value)    || 25.4;
  var mb = parseFloat(document.getElementById('mg-bottom').value) || 25.4;
  var ml = parseFloat(document.getElementById('mg-left').value)   || 31.7;
  var mr = parseFloat(document.getElementById('mg-right').value)  || 31.7;
  margins.top    = Math.round(mt * MM);
  margins.bottom = Math.round(mb * MM);
  margins.left   = Math.round(ml * MM);
  margins.right  = Math.round(mr * MM);
  document.querySelectorAll('.a4-page').forEach(updatePageMargins);
  document.getElementById('stat-margin').textContent = '邊距 ' + mt + ' / ' + ml + ' mm';
  toast('邊距已更新');
}

function updatePageMargins(page) {
  var body  = page.querySelector('.page-body');
  var guide = page.querySelector('.page-guide');
  if (body) {
    body.style.paddingTop    = margins.top    + 'px';
    body.style.paddingBottom = margins.bottom + 'px';
    body.style.paddingLeft   = margins.left   + 'px';
    body.style.paddingRight  = margins.right  + 'px';
  }
  if (guide) {
    guide.style.top   = margins.top    + 'px';
    guide.style.left  = margins.left   + 'px';
    guide.style.right = margins.right  + 'px';
  }
}

/* ── Zoom ── */
function zoom(delta) { setZoom(currentZoom + delta); }
function setZoom(val) {
  currentZoom = Math.max(30, Math.min(200, val));
  var w = document.getElementById('zoom-wrapper');
  w.style.transform = 'scale(' + currentZoom/100 + ')';
  w.style.transformOrigin = 'top center';
  document.getElementById('zoom-val').textContent = currentZoom + '%';
  document.getElementById('stat-zoom').textContent = currentZoom + '%';
}
function fitPage() {
  var sw = document.getElementById('scroll-area').clientWidth;
  setZoom(Math.max(30, Math.min(150, Math.floor((sw / (794+80)) * 100))));
}

/* ── Tab 縮排處理 ── */
function _handleTab(e) {
  var sel = window.getSelection();
  if (!sel || !sel.rangeCount) {
    /* 無選取，插入全形空格 */
    document.execCommand('insertText', false, '\u3000\u3000');
    return;
  }

  var range = sel.getRangeAt(0);

  if (sel.isCollapsed) {
    /* 游標無選取，插入全形空格 */
    document.execCommand('insertText', false, '\u3000\u3000');
    return;
  }

  /* 有選取：找出選取範圍涵蓋的所有 block 元素，在每個行首插入全形空格 */
  var BLOCK_TAGS = { P:1, H1:1, H2:1, H3:1, H4:1, H5:1, H6:1, LI:1, DIV:1, TD:1, TH:1 };

  /* 找出選取範圍的共同祖先 */
  var container = range.commonAncestorContainer;
  if (container.nodeType === Node.TEXT_NODE) container = container.parentNode;

  /* 收集所有在選取範圍內的 block 節點 */
  var blocks = [];
  function collectBlocks(node) {
    if (node.nodeType === Node.ELEMENT_NODE && BLOCK_TAGS[node.tagName]) {
      /* 檢查此節點是否與選取範圍有交集 */
      var nr = document.createRange();
      nr.selectNodeContents(node);
      if (range.compareBoundaryPoints(Range.END_TO_START, nr) < 0 &&
          range.compareBoundaryPoints(Range.START_TO_END, nr) > 0) {
        blocks.push(node);
        return; /* 不再往下找子 block */
      }
    }
    node.childNodes.forEach(collectBlocks);
  }

  /* 從 body 層往下找 */
  var body = container;
  while (body && !body.classList.contains('page-body')) body = body.parentNode;
  if (body) collectBlocks(body);

  if (blocks.length === 0) {
    /* fallback：直接插入 */
    document.execCommand('insertText', false, '\u3000\u3000');
    return;
  }

  /* 在每個 block 的第一個文字節點前插入全形空格 */
  blocks.forEach(function(block) {
    var firstText = null;
    function findFirst(n) {
      if (firstText) return;
      if (n.nodeType === Node.TEXT_NODE) { firstText = n; return; }
      n.childNodes.forEach(findFirst);
    }
    findFirst(block);
    if (firstText) {
      firstText.textContent = '\u3000\u3000' + firstText.textContent;
    } else {
      /* 空段落 */
      block.insertBefore(document.createTextNode('\u3000\u3000'), block.firstChild);
    }
  });
}

/* ── 儲存 / 還原選取範圍（讓 Panel 輸入框不破壞選取） ── */
var _savedRanges = [];
function _saveSel() {
  var sel = window.getSelection();
  _savedRanges = [];
  if (sel && sel.rangeCount) {
    for (var i = 0; i < sel.rangeCount; i++) {
      _savedRanges.push(sel.getRangeAt(i).cloneRange());
    }
  }
}

// 自動追蹤選取（合併字型/字號顯示）
document.addEventListener('selectionchange', function() {
  try {
    var sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    var node = sel.getRangeAt(0).startContainer;
    if (node.nodeType === 3) node = node.parentElement;

    // 確認是否在 page-body 內
    var inBody = false;
    var p = node;
    while (p) {
      if (p.classList && p.classList.contains('page-body')) { inBody = true; break; }
      p = p.parentElement;
    }

    // 確認是否在文字塊內
    var inFloatTxt = false;
    var q = node;
    while (q) {
      if (q.classList && q.classList.contains('float-txt-body')) { inFloatTxt = true; break; }
      q = q.parentElement;
    }

    if (inBody || inFloatTxt) {
      // 儲存選取範圍
      _saveSel();
      // 字體大小顯示
      var fsPx = parseFloat(window.getComputedStyle(node).fontSize);
      var fsPt = fsPx ? Math.round(fsPx / 1.3333) : '';
      var inp = document.getElementById('font-size-custom');
      if (inp && document.activeElement !== inp) inp.value = fsPt || '';
    }
  } catch(e) {}
});
function _restoreSel() {
  if (!_savedRanges.length) return;
  // 先把 focus 還給選取範圍所在的 contenteditable，再還原選取
  var range = _savedRanges[0];
  var node = range.commonAncestorContainer;
  if (node.nodeType === 3) node = node.parentElement;
  var editable = node;
  while (editable && editable.contentEditable !== 'true') editable = editable.parentElement;
  if (editable) editable.focus();
  var sel = window.getSelection();
  sel.removeAllRanges();
  _savedRanges.forEach(function(r) { sel.addRange(r); });
}

/* ── Font Size ── */
function _clearFontSize(el) {
  // 遞迴清除所有子節點的 font-size，確保新大小不被內層覆蓋
  el.querySelectorAll('*').forEach(function(node) {
    if (node.style && node.style.fontSize) node.style.fontSize = '';
  });
}

function applyFontSize(size) {
  var sel = window.getSelection();
  if (!sel || sel.isCollapsed) {
    // 無選取時，套用到游標所在段落
    var el = sel && sel.rangeCount ? sel.getRangeAt(0).commonAncestorContainer : null;
    if (el && el.nodeType === 3) el = el.parentElement;
    while (el && ['P','H1','H2','H3','DIV','LI'].indexOf(el.tagName) === -1) el = el.parentElement;
    if (el) {
      el.style.fontSize = size;
      _clearFontSize(el);
    }
    return;
  }
  // 有選取時，用 span 包住選取範圍，並清除內層殘留的 font-size
  document.execCommand('fontName', false, '_sz_');
  document.querySelectorAll('font[face="_sz_"]').forEach(function(f) {
    var s = document.createElement('span');
    s.style.fontSize = size;
    s.innerHTML = f.innerHTML;
    _clearFontSize(s);
    f.parentNode.replaceChild(s, f);
  });
}

/* ── Background Blocks ── */
var _bgBlockId = 0;
var _bgEditMode = false;
var _lastSelectedPage = null;

function toggleBgEditMode() {
  _bgEditMode = !_bgEditMode;
  document.body.classList.toggle('bg-edit-mode', _bgEditMode);
  var btn = document.getElementById('bg-edit-btn');
  if (btn) btn.classList.toggle('active', _bgEditMode);
  if (!_bgEditMode) {
    document.querySelectorAll('.bg-block').forEach(function(b) { b.classList.remove('bg-selected'); });
    _selectedBgBlock = null;
  }
  toast(_bgEditMode ? '色塊編輯模式：點色塊選中，再點色板改色' : '已切換回文字編輯');
}

function addBgBlock(color, opts) {
  // opts: { id, x, y, w, h, pageIndex } for restore
  var page;
  if (opts && opts.pageIndex != null) {
    var allPages = document.querySelectorAll('.a4-page');
    page = allPages[opts.pageIndex] || allPages[allPages.length - 1];
  } else {
    page = _lastSelectedPage || document.querySelector('.a4-page.selected') || document.querySelector('.a4-page');
  }
  if (!page) { toast('請先新增頁面'); return; }
  var id = (opts && opts.id) ? opts.id : ('bg' + (++_bgBlockId));
  var x  = (opts && opts.x  != null) ? opts.x  : 20;
  var y  = (opts && opts.y  != null) ? opts.y  : 20;
  var w  = (opts && opts.w  != null) ? opts.w  : 120;
  var h  = (opts && opts.h  != null) ? opts.h  : 60;

  var borderPx = (opts && opts.border) ? parseInt(opts.border) : 0;
  var borderCSS = borderPx > 0 ? 'border:'+borderPx+'px solid #000;' : '';

  var block = document.createElement('div');
  block.className = 'bg-block';
  block.dataset.bgid   = id;
  block.dataset.color  = color;
  block.dataset.border = String(borderPx);
  block.style.cssText  = 'left:'+x+'px;top:'+y+'px;width:'+w+'px;height:'+h+'px;background:'+color+';'+borderCSS;

  // delete btn
  var del = document.createElement('button');
  del.className = 'bg-block-del';
  del.textContent = '✕';
  del.onclick = function(e) { e.stopPropagation(); block.remove(); };
  block.appendChild(del);

  // resize handle
  var handle = document.createElement('div');
  handle.className = 'bg-block-handle';
  block.appendChild(handle);

  // drag move + select in edit mode
  block.addEventListener('mousedown', function(e) {
    if (e.target === handle || e.target === del) return;
    e.preventDefault();
    // 選中此色塊
    if (_bgEditMode) {
      document.querySelectorAll('.bg-block').forEach(function(b) { b.classList.remove('bg-selected'); });
      block.classList.add('bg-selected');
      _selectedBgBlock = block;
    }
    var startX = e.clientX - block.offsetLeft;
    var startY = e.clientY - block.offsetTop;
    function onMove(ev) {
      block.style.left = (ev.clientX - startX) + 'px';
      block.style.top  = (ev.clientY - startY) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // drag resize
  handle.addEventListener('mousedown', function(e) {
    e.preventDefault(); e.stopPropagation();
    var startX = e.clientX, startY = e.clientY;
    var startW = block.offsetWidth, startH = block.offsetHeight;
    function onMove(ev) {
      block.style.width  = Math.max(40, startW + ev.clientX - startX) + 'px';
      block.style.height = Math.max(20, startH + ev.clientY - startY) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  page.appendChild(block);
}

function collectBgBlocks() {
  var blocks = [];
  var allPages = document.querySelectorAll('.a4-page');
  document.querySelectorAll('.bg-block').forEach(function(b) {
    var pageIndex = 0;
    allPages.forEach(function(p, i) { if (p.contains(b)) pageIndex = i; });
    var entry = {
      id:        b.dataset.bgid,
      color:     b.dataset.color,
      x:         parseInt(b.style.left)   || 0,
      y:         parseInt(b.style.top)    || 0,
      w:         parseInt(b.style.width)  || 120,
      h:         parseInt(b.style.height) || 60,
      pageIndex: pageIndex,
      border:    b.dataset.border || '0'
    };
    if (b.dataset.type === 'line') {
      entry.type = 'line';
      entry.dir  = b.dataset.dir;
      entry.lw   = parseInt(b.dataset.lw) || 1;
    }
    blocks.push(entry);
  });
  return blocks;
}

function restoreBgBlocks(blocks) {
  if (!blocks || !blocks.length) return;
  blocks.forEach(function(b) {
    if (b.type === 'line') addLineBlock(b.dir, b.lw, b);
    else addBgBlock(b.color, b);
  });
}

/* ── Border on selected bg block ── */
function setBgBorder(px) {
  if (!_selectedBgBlock) { toast('請先在編輯模式下選取色塊'); return; }
  if (px === 0) {
    _selectedBgBlock.style.border = 'none';
    _selectedBgBlock.dataset.border = '0';
  } else {
    _selectedBgBlock.style.border = px + 'px solid #000';
    _selectedBgBlock.dataset.border = String(px);
  }
}

/* ── Line block ── */
function addLineBlock(dir, lw, opts) {
  var page;
  if (opts && opts.pageIndex != null) {
    var allPages = document.querySelectorAll('.a4-page');
    page = allPages[opts.pageIndex] || allPages[allPages.length - 1];
  } else {
    page = _lastSelectedPage || document.querySelector('.a4-page.selected') || document.querySelector('.a4-page');
  }
  if (!page) { toast('請先新增頁面'); return; }

  var id = (opts && opts.id) ? opts.id : ('bg' + (++_bgBlockId));
  var isH = (dir === 'h');
  var x = (opts && opts.x != null) ? opts.x : 20;
  var y = (opts && opts.y != null) ? opts.y : 60;
  var w = (opts && opts.w != null) ? opts.w : (isH ? 200 : lw);
  var h = (opts && opts.h != null) ? opts.h : (isH ? lw : 200);

  var block = document.createElement('div');
  block.className = 'bg-block';
  block.dataset.bgid  = id;
  block.dataset.color = 'transparent';
  block.dataset.type  = 'line';
  block.dataset.dir   = dir;
  block.dataset.lw    = String(lw);
  block.style.cssText =
    'left:'+x+'px;top:'+y+'px;' +
    'width:'+w+'px;height:'+h+'px;' +
    'background:transparent;' +
    (isH
      ? 'border-top:'+lw+'px solid #000;min-height:'+lw+'px;'
      : 'border-left:'+lw+'px solid #000;min-width:'+lw+'px;');

  var del = document.createElement('button');
  del.className = 'bg-block-del';
  del.textContent = '✕';
  del.onclick = function(e) { e.stopPropagation(); block.remove(); };
  block.appendChild(del);

  var handle = document.createElement('div');
  handle.className = 'bg-block-handle';
  block.appendChild(handle);

  block.addEventListener('mousedown', function(e) {
    if (e.target === handle || e.target === del) return;
    e.preventDefault();
    if (_bgEditMode) {
      document.querySelectorAll('.bg-block').forEach(function(b) { b.classList.remove('bg-selected'); });
      block.classList.add('bg-selected');
      _selectedBgBlock = block;
    }
    var startX = e.clientX - block.offsetLeft;
    var startY = e.clientY - block.offsetTop;
    function onMove(ev) {
      block.style.left = (ev.clientX - startX) + 'px';
      block.style.top  = (ev.clientY - startY) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  handle.addEventListener('mousedown', function(e) {
    e.preventDefault(); e.stopPropagation();
    var startX = e.clientX, startY = e.clientY;
    var startW = block.offsetWidth, startH = block.offsetHeight;
    function onMove(ev) {
      var nw = Math.max(lw, startW + ev.clientX - startX);
      var nh = Math.max(lw, startH + ev.clientY - startY);
      block.style.width  = nw + 'px';
      block.style.height = nh + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  page.appendChild(block);
}

/* ── Dynamic Color Palettes ── */
var _textColors = ['#000000','#434343','#ff4500'];
var _bgColors   = ['#000000','#434343','#ff4500'];
var _selectedBgBlock = null;

function _renderTextColors() {
  var row = document.getElementById('text-color-row');
  if (!row) return;
  // remove old dynamic swatches
  row.querySelectorAll('.clr-swatch:not(.clr-custom)').forEach(function(b) { b.remove(); });
  _textColors.forEach(function(c, i) {
    var btn = document.createElement('button');
    btn.className = 'clr-swatch';
    btn.title = c;
    btn.style.background = c;
    btn.style.order = i;
    if (c === '#ffffff') btn.style.border = '1px solid #ccc';
    btn.addEventListener('mousedown', function(e) { e.preventDefault(); });
    btn.onclick = function() { _restoreSel(); applyColor(c); };
    row.insertBefore(btn, row.querySelector('.clr-custom'));
  });
}

function _renderBgColors() {
  var row = document.getElementById('pn-bg-colors');
  if (!row) return;
  row.querySelectorAll('.bg-clr-swatch:not(.bg-clr-custom)').forEach(function(b) { b.remove(); });
  _bgColors.forEach(function(c, i) {
    var btn = document.createElement('button');

function _pushTextColor(hex) {

  _renderTextColors();
}

function _pushBgColor(hex) {
  _bgColors.push(hex);
  if (_bgColors.length > 4) _bgColors.shift();
  _renderBgColors();
}

function onTextColorCustom(hex) {

  applyColor(hex);
  _pushTextColor(hex);

function onBgColorPreview(hex) {

function onBgColorCustom(hex) {
  // 關閉選色器時才推入陣列並新增色塊

    _selectedBgBlock.dataset.color = hex;

}

/* ── Add Page ── */
/* 在第 n 頁後插入新頁面（n=0 表示插入到最前面） */
function insertPageAt() {
  var allPages = document.querySelectorAll('.a4-page');
  var total    = allPages.length;
  var n = parseInt(document.getElementById('insert-page-num').value) || 1;
  n = Math.max(0, Math.min(n, total));

  if (n >= total) {
    addPage();
    return;
  }

  var newPage = _buildPageElement('');
  var container = document.getElementById('pages-container');
  var refPage = allPages[n];
  container.insertBefore(newPage, refPage);
  pageCount++;

    newPage.scrollIntoView({ behavior: 'smooth', block: 'start' });

  }, 80);

/* 刪除第 n 頁（1-based） */
function deletePageAt() {
  var allPages = document.querySelectorAll('.a4-page');
  var total    = allPages.length;
  if (total <= 1) { toast('至少保留一頁，無法刪除'); return; }
  var n = parseInt(document.getElementById('delete-page-num').value) || 1;
  n = Math.max(1, Math.min(n, total));
  var page = allPages[n - 1];
  if (!confirm('確定刪除第 ' + n + ' 頁？此操作無法復原。')) return;
  page.parentNode.removeChild(page);
  refreshFooters();
  updateStatus();
  toast('已刪除第 ' + n + ' 頁');
}

    var el = sel.getRangeAt(0).commonAncestorContainer;

    while (el && ['H1','H2','P','DIV'].indexOf(el.tagName) === -1) el = el.parentElement;
    if (el) {

      if (el.tagName === 'H2' || el.tagName === 'P') el.style.textAlign = el.style.textAlign || 'left';

/* ── 自動換頁 ── */
var _overflowTimer = null;
function checkOverflow(body) {
  /* 防抖：輸入停止 300ms 後才執行，避免頻繁重排 */
  clearTimeout(_overflowTimer);
  _overflowTimer = setTimeout(function() { _doCheckOverflow(body); }, 300);
}

function _doCheckOverflow(body) {
  var paddingTop    = parseFloat(body.style.paddingTop)    || 96;
  var paddingBottom = parseFloat(body.style.paddingBottom) || 80;
  var pageHeight    = 1123;
  var maxContentH   = pageHeight - paddingTop - paddingBottom;

  if (body.scrollHeight <= maxContentH + 2) return;

  /* 過濾掉絕對定位的浮動元素（不佔文流） */
  function isFlow(n) {
    if (n.nodeType !== Node.ELEMENT_NODE) return n.nodeType === Node.TEXT_NODE;
    var cls = n.classList;
    return !(cls.contains('float-img-wrap') || cls.contains('float-txt-wrap'));
  }

  var children = Array.from(body.childNodes).filter(isFlow);
  if (children.length === 0) return;

  /* ── 步驟 1：找出第一個讓累計高度超出的子節點 ── */
  var bodyTop     = body.getBoundingClientRect().top;
  var limitBottom = bodyTop + maxContentH;
  var splitIdx    = -1;

  for (var i = 0; i < children.length; i++) {
    var n = children[i];
    if (n.nodeType !== Node.ELEMENT_NODE) continue;
    var rect = n.getBoundingClientRect();
    if (rect.bottom > limitBottom + 2) {
      splitIdx = i;
      break;
    }
  }

  if (splitIdx < 0) return; /* 沒有節點超出 */

  /* ── 步驟 2：嘗試在溢出節點內部拆分（以行/子節點為單位） ── */
  var overflowNode = children[splitIdx];
  var splitResult  = _splitNodeAtLimit(overflowNode, limitBottom);
  /* splitResult.keep  = 留在本頁的部分（可能是修改後的原節點，或 null）
     splitResult.spill = 移到下一頁的部分（Element 或 null） */

  /* ── 步驟 3：決定要移到下一頁的節點清單 ── */
  var toMove = [];
  if (splitResult.spill) {
    toMove.push(splitResult.spill);
  }
  /* splitIdx 之後的節點全部移走 */
  children.slice(splitIdx + 1).forEach(function(n) { toMove.push(n); });

  if (toMove.length === 0) return;

  /* ── 步驟 4：找或建立下一頁 ── */
  var currentPage = body.closest('.a4-page');
  var allPages    = Array.from(document.querySelectorAll('.a4-page'));
  var pageIdx     = allPages.indexOf(currentPage);
  var nextPage    = allPages[pageIdx + 1] || null;

  var sel   = window.getSelection();
  var range = (sel && sel.rangeCount) ? sel.getRangeAt(0).cloneRange() : null;

  if (!nextPage) {
    addPage('');
    allPages = Array.from(document.querySelectorAll('.a4-page'));
    nextPage = allPages[pageIdx + 1];
  }

  var nextBody = nextPage.querySelector('.page-body');
  if (!nextBody) return;

  /* ── 步驟 5：把溢出節點從原頁移除（若已被拆分，原節點已縮短，不需再移） ── */
  if (!splitResult.spill && splitIdx >= 0) {
    /* 整個 overflowNode 都要移走（無法拆分的情況） */
    if (overflowNode.parentNode === body) {
      body.removeChild(overflowNode);
      toMove.unshift(overflowNode);
    }
  }
  /* splitIdx+1 以後的節點從原頁移除 */
  children.slice(splitIdx + 1).forEach(function(n) {
    if (n.parentNode === body) body.removeChild(n);
  });

  /* ── 步驟 6：插入到下一頁開頭 ── */
  var firstChild = nextBody.firstChild;
  toMove.forEach(function(n) {
    nextBody.insertBefore(n, firstChild);
    firstChild = n;
  });

  if (range) {
    try { sel.removeAllRanges(); sel.addRange(range); } catch(e) {}
  }

  updateStatus();
  _doCheckOverflow(nextBody);
}

/* 嘗試在 limitBottom（視窗座標）處拆分 el 的內容。
   回傳 { keep: el（已縮短）, spill: 新節點（溢出部分）}
   若無法拆分則回傳 { keep: null, spill: null }               */
function _splitNodeAtLimit(el, limitBottom) {
  if (el.nodeType !== Node.ELEMENT_NODE) return { keep: null, spill: null };

  /* 取得直接子節點（只考慮元素節點，文字節點以行高估算） */
  var kids = Array.from(el.childNodes);
  if (kids.length === 0) return { keep: null, spill: null };

  /* 找第一個超出的子節點 */
  var splitAt = -1;
  for (var i = 0; i < kids.length; i++) {
    var k = kids[i];
    if (k.nodeType === Node.ELEMENT_NODE) {
      var r = k.getBoundingClientRect();
      if (r.bottom > limitBottom + 2) { splitAt = i; break; }
    }
  }

  if (splitAt < 0) return { keep: null, spill: null }; /* 全部都在限制內 */
  if (splitAt === 0) return { keep: null, spill: null }; /* 第一個子節點就超出，整體移走 */

  /* 建立一個相同標籤的新節點，把超出的子節點移進去 */
  var spill = document.createElement(el.tagName);
  /* 複製 class / style */
  if (el.className) spill.className = el.className;
  if (el.getAttribute('style')) spill.setAttribute('style', el.getAttribute('style'));

  /* 把 splitAt 以後的子節點移到 spill */
  var toSpill = kids.slice(splitAt);
  toSpill.forEach(function(k) {
    el.removeChild(k);
    spill.appendChild(k);
  });

  return { keep: el, spill: spill };
}

/* ── Load HTML ── */
function extractJSON(html, varName, openChar, closeChar) {
  var marker = 'var ' + varName + '=';
  var idx = html.indexOf(marker);
  if (idx === -1) return null;
  var start = html.indexOf(openChar, idx + marker.length);
  if (start === -1) return null;
  var depth = 0, i = start;
  while (i < html.length) {
    var ch = html[i];
    if (ch === openChar)  depth++;
    if (ch === closeChar) { depth--; if (depth === 0) break; }
    i++;
  }
  if (depth !== 0) return null;
  try { return JSON.parse(html.slice(start, i + 1)); } catch(e) { return null; }
}

  } else {

  }
}

/* ══════════════════════════════════════════════
   DOCX Raw XML 解析器
   直接讀 word/document.xml，完整保留對齊資訊
══════════════════════════════════════════════ */

/* 從 rPr 判斷 toggle 屬性是否啟用（w:val="0" 表示關閉，不存在或 val="1" 表示開啟） */
function wToggle(rPr, tagName) {
  if (!rPr) return false;
  var el = rPr.getElementsByTagNameNS('*', tagName)[0];
  if (!el) return false;
  var val = el.getAttribute('w:val') || el.getAttribute('val') || '';
  return val !== '0' && val !== 'false';
}

/* 從 XML 節點取屬性值（w:val） */
function wxVal(parent, tagName) {
  if (!parent) return null;
  var el = parent.getElementsByTagNameNS('*', tagName)[0];
  if (!el) return null;
  return el.getAttribute('w:val') || el.getAttribute('val') || null;
}

/* 把 Word 半點(halfPt) 轉 pt */
function halfPtToPt(v) { return v ? (parseInt(v) / 2) : null; }

/* Word 色碼轉 CSS */
function wColor(v) {
  if (!v || v === 'auto' || v.length !== 6) return null;
  return '#' + v;
}

/* 解析單一 <w:p> → HTML 字串 */
function parseWParagraph(wp, styleMap) {
  /* ── 段落屬性 pPr ── */
  var pPr    = wp.getElementsByTagNameNS('*','pPr')[0] || null;
  var jcEl   = pPr ? pPr.getElementsByTagNameNS('*','jc')[0]  : null;
  var jcVal  = jcEl ? (jcEl.getAttribute('w:val') || jcEl.getAttribute('val') || '') : '';
  var alignMap = { center:'center', right:'right', both:'justify', distribute:'justify', left:'left' };
  var align  = alignMap[jcVal] || 'left';

  /* 段落樣式名稱 */
  var pStyleEl = pPr ? pPr.getElementsByTagNameNS('*','pStyle')[0] : null;
  var pStyle   = pStyleEl ? (pStyleEl.getAttribute('w:val') || pStyleEl.getAttribute('val') || '') : '';

  /* 判斷是否為標題 */
  var isH1 = /^[Hh]eading\s*1$|^1$|heading1/i.test(pStyle);
  var isH2 = /^[Hh]eading\s*[23456]$|^[23456]$|heading[23456]/i.test(pStyle);

  /* ── 解析單一 <w:r> → HTML span 字串 ── */
  function renderRun(wr) {
    var tEls = wr.getElementsByTagNameNS('*','t');
    var text = '';
    for (var ti = 0; ti < tEls.length; ti++) text += tEls[ti].textContent;
    if (!text) return '';

    var rPr     = wr.getElementsByTagNameNS('*','rPr')[0] || null;
    var bold    = wToggle(rPr, 'b') || wToggle(rPr, 'bCs');
    var italic  = wToggle(rPr, 'i') || wToggle(rPr, 'iCs');
    var strike  = wToggle(rPr, 'strike') || wToggle(rPr, 'dstrike');
    var colorEl = rPr ? rPr.getElementsByTagNameNS('*','color')[0] : null;
    var szEl    = rPr ? rPr.getElementsByTagNameNS('*','sz')[0]    : null;
    var underEl = rPr ? rPr.getElementsByTagNameNS('*','u')[0]     : null;

    var underVal = underEl ? (underEl.getAttribute('w:val') || underEl.getAttribute('val') || 'single') : '';
    var colorVal = colorEl ? wColor(colorEl.getAttribute('w:val') || colorEl.getAttribute('val') || '') : null;
    var ptSize   = szEl    ? halfPtToPt(szEl.getAttribute('w:val') || szEl.getAttribute('val')) : null;
    if (!ptSize) ptSize = isH1 ? 18 : isH2 ? 16 : 14;

    var styles = [];
    styles.push('font-family:\'標楷體\',\'BiauKai\',\'DFKai-SB\',serif');
    styles.push('font-size:' + ptSize + 'pt');
    styles.push('line-height:24pt');
    if (bold || isH1 || isH2)              styles.push('font-weight:bold');
    if (italic)                            styles.push('font-style:italic');
    if (underVal && underVal !== 'none')   styles.push('text-decoration:underline');
    if (strike)                            styles.push('text-decoration:line-through');
    if (colorVal)                          styles.push('color:' + colorVal);

    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<span style="' + styles.join(';') + '">' + safe + '</span>';
  }

  /* ── 按順序遍歷段落直接子節點，處理 r / br / hyperlink ── */
  var innerHtml = '';
  for (var ci = 0; ci < wp.childNodes.length; ci++) {
    var child = wp.childNodes[ci];
    var ln = child.localName;
    if (ln === 'r') {
      innerHtml += renderRun(child);
    } else if (ln === 'br') {
      /* 段落內強制換行 */
      innerHtml += '<br>';
    } else if (ln === 'hyperlink') {
      /* 超連結：取出裡面的 run */
      for (var hi = 0; hi < child.childNodes.length; hi++) {
        if (child.childNodes[hi].localName === 'r') innerHtml += renderRun(child.childNodes[hi]);
      }
    } else if (ln === 'ins' || ln === 'del') {
      /* 追蹤修訂：取出裡面的 run */
      for (var ii = 0; ii < child.childNodes.length; ii++) {
        if (child.childNodes[ii].localName === 'r') innerHtml += renderRun(child.childNodes[ii]);
      }
    }
  }

  if (!innerHtml) innerHtml = '<br>';

  /* ── 組合段落 ── */
  var pStyles = [];
  pStyles.push('font-family:\'標楷體\',\'BiauKai\',\'DFKai-SB\',serif');
  pStyles.push('line-height:24pt');
  pStyles.push('margin:0');
  /* 永遠明確寫入 text-align，確保匯出時能正確讀回 */
  pStyles.push('text-align:' + align);

  if (isH1) {
    pStyles.push('font-size:18pt');
    pStyles.push('font-weight:bold');
    return '<h1 style="' + pStyles.join(';') + '">' + innerHtml + '</h1>';
  } else if (isH2) {
    pStyles.push('font-size:16pt');
    pStyles.push('font-weight:bold');
    return '<h2 style="' + pStyles.join(';') + '">' + innerHtml + '</h2>';
  } else {
    pStyles.push('font-size:14pt');
    return '<p style="' + pStyles.join(';') + '">' + innerHtml + '</p>';
  }
}

/* ── 讀取 XML 屬性（相容 w:xxx 和 xxx 兩種寫法） ── */
function wAttr(el, name) {
  if (!el) return '';
  return el.getAttribute('w:' + name) || el.getAttribute(name) || '';
}

/* ── 解析 <w:tbl> → HTML table ── */
function parseWTable(wtbl) {
  /* 判斷表格是否有邊框：讀取 tblPr > tblBorders > top 的 val
     若 val 為 none/nil/0 或不存在，視為無邊框排版表格 */
  var tblHasBorder = false;
  for (var pi = 0; pi < wtbl.childNodes.length; pi++) {
    if (wtbl.childNodes[pi].localName !== 'tblPr') continue;
    var tblPr = wtbl.childNodes[pi];
    var tblBordersEl = null;
    for (var bi = 0; bi < tblPr.childNodes.length; bi++) {
      if (tblPr.childNodes[bi].localName === 'tblBorders') { tblBordersEl = tblPr.childNodes[bi]; break; }
    }
    if (tblBordersEl) {
      /* 只要有任一邊框子元素且 val 不是 none/nil，就視為有邊框 */
      for (var bj = 0; bj < tblBordersEl.childNodes.length; bj++) {
        var bEl = tblBordersEl.childNodes[bj];
        var bVal = bEl.getAttribute ? (bEl.getAttribute('w:val') || bEl.getAttribute('val') || '') : '';
        if (bVal && bVal !== 'none' && bVal !== 'nil') { tblHasBorder = true; break; }
      }
    }
    break;
  }

  /* 先掃第一列，計算各欄 twips 總和（用來算百分比） */
  var firstRowTwips = [];
  var totalTwips = 0;
  for (var si = 0; si < wtbl.childNodes.length; si++) {
    var srow = wtbl.childNodes[si];
    if (srow.localName !== 'tr') continue;
    for (var sc = 0; sc < srow.childNodes.length; sc++) {
      var scell = srow.childNodes[sc];
      if (scell.localName !== 'tc') continue;
      var stcPr = null;
      for (var sp = 0; sp < scell.childNodes.length; sp++) {
        if (scell.childNodes[sp].localName === 'tcPr') { stcPr = scell.childNodes[sp]; break; }
      }
      var stcW = stcPr ? null : null;
      if (stcPr) {
        for (var sw = 0; sw < stcPr.childNodes.length; sw++) {
          if (stcPr.childNodes[sw].localName === 'tcW') { stcW = stcPr.childNodes[sw]; break; }
        }
      }
      var tw = stcW ? (parseInt(wAttr(stcW, 'w')) || 0) : 0;
      firstRowTwips.push(tw);
      totalTwips += tw;
    }
    break; /* 只看第一列 */
  }

  var rows = wtbl.childNodes;
  var rowsHtml = '';

  for (var ri = 0; ri < rows.length; ri++) {
    var row = rows[ri];
    if (row.localName !== 'tr') continue;

    var cells = row.childNodes;
    var cellsHtml = '';
    var cellIdx = 0;

    for (var ci = 0; ci < cells.length; ci++) {
      var cell = cells[ci];
      if (cell.localName !== 'tc') continue;

      /* 找 tcPr（直接子節點） */
      var tcPr = null;
      for (var tp = 0; tp < cell.childNodes.length; tp++) {
        if (cell.childNodes[tp].localName === 'tcPr') { tcPr = cell.childNodes[tp]; break; }
      }

      /* 跨欄 */
      var gridSpanEl = null, vMergeEl = null, tcWEl = null, shdEl = null, vAlignEl = null;
      if (tcPr) {
        for (var tc2 = 0; tc2 < tcPr.childNodes.length; tc2++) {
          var tcn = tcPr.childNodes[tc2];
          if (tcn.localName === 'gridSpan') gridSpanEl = tcn;
          if (tcn.localName === 'vMerge')   vMergeEl   = tcn;
          if (tcn.localName === 'tcW')      tcWEl      = tcn;
          if (tcn.localName === 'shd')      shdEl      = tcn;
          if (tcn.localName === 'vAlign')   vAlignEl   = tcn;
        }
      }

      var colspan   = gridSpanEl ? (parseInt(wAttr(gridSpanEl, 'val')) || 1) : 1;
      var vMergeVal = vMergeEl   ? (wAttr(vMergeEl, 'val') || '')            : null;

      /* vMerge 無 val 或 val="" 表示延續列，跳過 */
      if (vMergeEl !== null && vMergeVal !== 'restart') { cellIdx += colspan; continue; }

      /* 欄寬：優先用 tcW，fallback 用 tblGrid 算出的比例 */
      var twips = tcWEl ? (parseInt(wAttr(tcWEl, 'w')) || 0) : 0;
      /* 若 tcW 沒有或是 0，從 firstRowTwips 加總 colspan 個欄 */
      if (!twips && firstRowTwips.length > 0) {
        for (var fi = cellIdx; fi < cellIdx + colspan && fi < firstRowTwips.length; fi++) {
          twips += firstRowTwips[fi];
        }
      }
      var widthStyle = (twips > 0 && totalTwips > 0)
        ? 'width:' + (twips / totalTwips * 100).toFixed(2) + '%;'
        : '';

      /* 背景色 */
      var bgFill = shdEl ? wAttr(shdEl, 'fill') : '';
      var bgCss  = (bgFill && bgFill !== 'auto' && /^[0-9A-Fa-f]{6}$/.test(bgFill))
        ? 'background:#' + bgFill + ';' : '';

      /* 垂直對齊 */
      var vAlignVal2 = vAlignEl ? (wAttr(vAlignEl, 'val') || 'top') : 'top';
      var vAlign = { top:'top', center:'middle', bottom:'bottom' }[vAlignVal2] || 'top';

      /* 儲存格內容 */
      var cellContent = '';
      for (var cci = 0; cci < cell.childNodes.length; cci++) {
        var cn = cell.childNodes[cci];
        if (cn.localName === 'p')   cellContent += parseWParagraph(cn);
        if (cn.localName === 'tbl') cellContent += parseWTable(cn);
      }
      if (!cellContent) cellContent = '<p style="margin:0;font-family:\'標楷體\',serif;font-size:14pt;line-height:24pt;"><br></p>';

      var tdAttrs = colspan > 1 ? ' colspan="' + colspan + '"' : '';
      /* 無邊框表格：完全不輸出 border 屬性，靠 CSS 預設（無邊框）顯示 */
      var borderCss = tblHasBorder ? 'border:1px solid #000;' : '';
      var tdStyle = borderCss + widthStyle + bgCss +
                    'padding:4px 8px;vertical-align:' + vAlign + ';' +
                    'word-break:break-word;overflow-wrap:break-word;';
      cellsHtml += '<td' + tdAttrs + ' style="' + tdStyle + '">' + cellContent + '</td>';
      cellIdx += colspan;
    }

    if (cellsHtml) rowsHtml += '<tr>' + cellsHtml + '</tr>';
  }

  if (!rowsHtml) return '';

  return '<table style="border-collapse:collapse;width:100%;table-layout:fixed;' +
         'margin:4pt 0;font-family:\'標楷體\',\'BiauKai\',serif;font-size:14pt;line-height:24pt;">' +
         '<tbody>' + rowsHtml + '</tbody></table>';
}

/* ── 載入 DOCX（Raw XML 模式） ── */
function loadDOCX(file, event) {
  function doLoad() {
    var reader = new FileReader();
    reader.onload = function(e) {
      JSZip.loadAsync(e.target.result).then(function(zip) {
        var xmlFile = zip.file('word/document.xml');
        if (!xmlFile) { toast('無法讀取 document.xml'); return; }
        return xmlFile.async('string');
      }).then(function(xmlStr) {
        var parser = new DOMParser();
        var xmlDoc = parser.parseFromString(xmlStr, 'application/xml');

        /* 找到 w:body，遍歷直接子節點（段落 + 表格） */
        var body = xmlDoc.getElementsByTagNameNS('*', 'body')[0];
        if (!body) { toast('找不到文件內容'); return; }

        /* 把 body 內容依分頁符號拆成多頁 */
        var pages = [];
        var currentPage = [];

        function flushPage() {
          if (currentPage.length > 0) {
            pages.push(currentPage.join(''));
            currentPage = [];
          }
        }

        /* 判斷 <w:p> 是否包含分頁符號 <w:br w:type="page"> */
        function hasPageBreak(wp) {
          var brs = wp.getElementsByTagNameNS('*', 'br');
          for (var bi = 0; bi < brs.length; bi++) {
            var t = brs[bi].getAttribute('w:type') || brs[bi].getAttribute('type') || '';
            if (t === 'page') return true;
          }
          /* 也偵測 <w:lastRenderedPageBreak> */
          if (wp.getElementsByTagNameNS('*', 'lastRenderedPageBreak').length > 0) return true;
          return false;
        }

        var children = body.childNodes;
        for (var i = 0; i < children.length; i++) {
          var node = children[i];
          if (node.localName === 'p') {
            if (hasPageBreak(node)) {
              /* 分頁符號：先把目前頁面存起來，開新頁 */
              flushPage();
            } else {
              currentPage.push(parseWParagraph(node));
            }
          } else if (node.localName === 'tbl') {
            currentPage.push(parseWTable(node));
          }
        }
        flushPage(); /* 最後一頁 */

        if (pages.length === 0) { toast('文件是空的'); return; }
        document.getElementById('pages-container').innerHTML = '';
        pageCount = 0;
        pages.forEach(function(html) { addPage(html); });
        toast('已載入 DOCX，共 ' + pages.length + ' 頁');
      }).catch(function(err) { toast('DOCX 解析失敗：' + err.message); });
      if (event) event.target.value = '';
    };
    reader.readAsArrayBuffer(file);
  }

  if (typeof JSZip === 'undefined') {
    if (window._jszipFailed) { toast('JSZip 載入失敗，請檢查網路'); return; }
    toast('函式庫載入中，請稍候…');
    var attempts = 0;
    var wait = setInterval(function() {
      attempts++;
      if (typeof JSZip !== 'undefined') { clearInterval(wait); doLoad(); }
      else if (attempts > 30) { clearInterval(wait); toast('載入逾時，請重新整理頁面'); }
    }, 300);
    return;
  }
  doLoad();
}

function loadHTML(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var html = e.target.result;

    /* 依序嘗試各版本的變數名稱 */
    var state = extractJSON(html, 'EDITOR_STATE', '{', '}')
             || extractJSON(html, 'SAVED_STATE',  '{', '}')
             || null;

    /* 舊版純陣列格式 SAVED_PAGES=[...] */
    var pagesArr = null;
    if (!state) {
      pagesArr = extractJSON(html, 'SAVED_PAGES', '[', ']');
    }

    if (state || pagesArr) {
      try {
        var pages = pagesArr || state.pages || state;
        if (!Array.isArray(pages) || pages.length === 0) throw new Error('no pages');
        document.getElementById('pages-container').innerHTML = '';
        pageCount = 0;
        var mg = state && state.margins;
        if (mg) {
          document.getElementById('mg-top').value    = mg.top;
          document.getElementById('mg-bottom').value = mg.bottom;
          document.getElementById('mg-left').value   = mg.left;
          document.getElementById('mg-right').value  = mg.right;
          applyMargins();
        }
        pages.forEach(function(h) { addPage(h); });

        /* 還原色塊、文字塊、顏色、文件名稱 */
        if (state) {
          if (state.bgBlocks)   restoreBgBlocks(state.bgBlocks);
          if (state.floatTexts) restoreFloatTexts(state.floatTexts);
          if (state.docName) {
            var ni = document.getElementById('doc-name-input');
            if (ni) { ni.value = state.docName; updateDocName(state.docName); }
          }
          if (state.textColors) { _textColors = state.textColors; _renderTextColors(); }
          if (state.bgColors)   { _bgColors   = state.bgColors;   _renderBgColors(); }
        }

        toast('已載入 ' + pages.length + ' 頁');
      } catch(err) { toast('格式錯誤：' + err.message); }
    } else {
      toast('找不到計畫書資料（可能是更舊的格式）');
    }
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function getDateStr() {
  var d = new Date();
  return d.getFullYear() + p2(d.getMonth()+1) + p2(d.getDate()) + '_' + p2(d.getHours()) + p2(d.getMinutes());
}
function p2(n) { return n < 10 ? '0'+n : ''+n; }

/* ── PDF Export ── */
function exportPDF() {
  document.querySelectorAll('.page-body').forEach(function(b) { b.contentEditable='false'; });
  var ml = parseFloat(document.getElementById('mg-left').value)   || 31.7;
  var mr = parseFloat(document.getElementById('mg-right').value)  || 31.7;
  var mt = parseFloat(document.getElementById('mg-top').value)    || 25.4;

    '@page{size:A4 portrait;margin:0}' +

    '#main,#scroll-area{overflow:visible!important}' +

    '#zoom-wrapper{transform:none!important;display:block}' +

    '.a4-page.selected{box-shadow:none!important}' +
